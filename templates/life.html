<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>남은 인생 계산기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: 'Segoe UI', sans-serif;
      color: #f0f0f0;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 460px;
      text-align: center;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: #fff;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 36px;
    }

    .inputs {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
    }

    .input-group {
      flex: 1;
      text-align: left;
    }

    label {
      display: block;
      font-size: 0.75rem;
      color: #888;
      margin-bottom: 6px;
      letter-spacing: 0.05em;
    }

    input[type="number"] {
      width: 100%;
      padding: 12px 14px;
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      color: #fff;
      font-size: 1.1rem;
      outline: none;
      transition: border-color 0.2s;
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

    input[type="number"]:focus {
      border-color: #555;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.85; }

    .result {
      display: none;
      margin-top: 36px;
      padding-top: 32px;
      border-top: 1px solid #2e2e2e;
    }

    .stats {
      display: flex;
      justify-content: space-around;
      gap: 8px;
      margin-bottom: 28px;
    }

    .stat {
      flex: 1;
    }

    .stat-value {
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.1;
    }

    .stat-label {
      font-size: 0.72rem;
      color: #555;
      margin-top: 4px;
    }

    .message {
      font-size: 0.9rem;
      color: #aaa;
      line-height: 1.6;
      font-style: italic;
    }

    .error {
      margin-top: 16px;
      font-size: 0.82rem;
      color: #e05;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>남은 인생 계산기</h1>
    <p class="subtitle">오늘부터 남은 시간을 확인해보세요</p>

    <div class="inputs">
      <div class="input-group">
        <label>현재 나이</label>
        <input type="number" id="age" placeholder="25" min="0" max="149" />
      </div>
      <div class="input-group">
        <label>기대 수명</label>
        <input type="number" id="life" placeholder="80" min="1" max="150" />
      </div>
    </div>

    <button onclick="calculate()">계산하기</button>
    <p class="error" id="error"></p>

    <div class="result" id="result">
      <div class="stats">
        <div class="stat">
          <div class="stat-value" id="years">—</div>
          <div class="stat-label">남은 년</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="days">—</div>
          <div class="stat-label">남은 일</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="hours">—</div>
          <div class="stat-label">남은 시간</div>
        </div>
      </div>
      <p class="message" id="message"></p>
    </div>
  </div>

  <script>
    const MESSAGES = [
      "지금 이 순간도 당신의 인생입니다.",
      "남은 시간은 아직 충분히 많습니다.",
      "오늘 하루가 가장 젊은 날입니다.",
      "시간은 흐르지만, 선택은 언제나 당신의 것입니다.",
      "아직 쓰지 않은 챕터가 더 많습니다.",
      "지금 시작해도 늦지 않았습니다.",
      "매일이 새로운 기회입니다.",
    ];

    function fmt(n) {
      if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + "M";
      if (n >= 10_000)    return Math.round(n / 1000) + "k";
      return n.toLocaleString("ko-KR");
    }

    function calculate() {
      const age  = parseInt(document.getElementById("age").value);
      const life = parseInt(document.getElementById("life").value);
      const err  = document.getElementById("error");
      const res  = document.getElementById("result");

      err.style.display = "none";
      res.style.display = "none";

      if (isNaN(age) || isNaN(life)) {
        err.textContent = "나이와 기대 수명을 모두 입력해주세요.";
        err.style.display = "block";
        return;
      }
      if (age < 0 || life < 1) {
        err.textContent = "올바른 값을 입력해주세요.";
        err.style.display = "block";
        return;
      }
      if (age >= life) {
        err.textContent = "기대 수명은 현재 나이보다 커야 합니다.";
        err.style.display = "block";
        return;
      }

      const remYears = life - age;
      const remDays  = Math.round(remYears * 365.25);
      const remHours = remDays * 24;

      document.getElementById("years").textContent = fmt(remYears);
      document.getElementById("days").textContent  = fmt(remDays);
      document.getElementById("hours").textContent = fmt(remHours);
      document.getElementById("message").textContent =
        MESSAGES[Math.floor(Math.random() * MESSAGES.length)];

      res.style.display = "block";
    }

    document.addEventListener("keydown", e => {
      if (e.key === "Enter") calculate();
    });
  </script>
</body>
</html>
